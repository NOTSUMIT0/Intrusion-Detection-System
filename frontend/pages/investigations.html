<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../public/favicon.png">
  <title>IDS | Investigations</title>
  <link href="../public/output.css" rel="stylesheet">
</head>

<body class="bg-[#0b0f19] text-gray-200 min-h-screen flex">

  <!-- ================= SIDEBAR ================= -->
  <aside class="w-64 bg-[#111827] border-r border-gray-800 p-6 flex-shrink-0">
    <h2 class="text-xl font-bold text-cyan-400 mb-8">
      IDS Console
    </h2>

    <nav class="space-y-4 text-sm">
      <a href="dashboard.html"
        class="block text-gray-400 hover:text-cyan-400 transition">
        Dashboard
      </a>

      <a href="alerts.html"
        class="block text-gray-400 hover:text-cyan-400 transition">
        Alerts
      </a>

      <a href="investigations.html"
        class="block text-cyan-400 font-semibold">
        Investigations
      </a>

      <a href="analytics.html"
        class="block text-gray-400 hover:text-cyan-400 transition">
        Analytics
      </a>

      <a href="mitre.html"
        class="block text-gray-400 hover:text-cyan-400 transition">
        MITRE ATT&CK
      </a>

      <a href="about.html"
        class="block text-gray-400 hover:text-cyan-400 transition">
        About
      </a>
    </nav>
  </aside>

  <!-- ================= MAIN CONTENT ================= -->
  <main class="flex-1 p-6 space-y-8 overflow-y-auto">

    <!-- Header -->
    <header>
      <h1 class="text-3xl font-bold text-cyan-400">
        Investigation Center
      </h1>
      <p class="text-gray-400 mt-1">
        Manage alerts under investigation and review resolved incidents.
      </p>
    </header>

    <!-- ================= STATS CARDS ================= -->
    <section class="grid grid-cols-4 gap-6">
      <div class="bg-[#111827] p-5 rounded-lg border border-gray-800">
        <p class="text-gray-400 text-sm">Total Alerts</p>
        <p id="statTotal" class="text-4xl font-bold mt-2">0</p>
      </div>

      <div class="bg-[#111827] p-5 rounded-lg border border-gray-800">
        <p class="text-gray-400 text-sm">Under Investigation</p>
        <p id="statInvestigating" class="text-4xl font-bold mt-2 text-purple-400">0</p>
      </div>

      <div class="bg-[#111827] p-5 rounded-lg border border-gray-800">
        <p class="text-gray-400 text-sm">Resolved</p>
        <p id="statResolved" class="text-4xl font-bold mt-2 text-green-400">0</p>
      </div>

      <div class="bg-[#111827] p-5 rounded-lg border border-gray-800">
        <p class="text-gray-400 text-sm">Resolution Rate</p>
        <p id="statRate" class="text-4xl font-bold mt-2 text-cyan-400">0%</p>
      </div>
    </section>


    <!-- ================= CHARTS ================= -->
    <section class="grid grid-cols-2 gap-6">
      <div class="bg-[#111827] p-4 rounded-lg border border-gray-800">
        <h3 class="text-sm text-gray-400 mb-2">Investigation Pipeline</h3>
        <div id="pipelineChart" class="h-72"></div>
      </div>

      <div class="bg-[#111827] p-4 rounded-lg border border-gray-800">
        <h3 class="text-sm text-gray-400 mb-2">Severity Breakdown</h3>
        <div id="severityBreakdown" class="h-72"></div>
      </div>
    </section>


    <!-- ================= TOGGLE TABS ================= -->
    <div class="flex border-b border-gray-800">
      <button id="tabInvestigating"
        onclick="switchTab('investigating')"
        class="px-6 py-3 text-sm font-semibold border-b-2 border-purple-500 text-purple-400 transition">
        🔍 Under Investigation
      </button>

      <button id="tabResolved"
        onclick="switchTab('resolved')"
        class="px-6 py-3 text-sm font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-200 transition">
        ✅ Resolved
      </button>
    </div>


    <!-- ================= PACKET CARDS CONTAINER ================= -->
    <div id="packetCards" class="space-y-4"></div>

  </main>


  <!-- ================= DETAIL MODAL ================= -->
  <div
    id="detailModal"
    class="fixed inset-0 z-50 hidden
          flex items-center justify-center
          bg-black/60 backdrop-blur-sm">

    <div
      class="relative w-full max-w-3xl
            max-h-[85vh]
            bg-[#0f172a]
            border border-gray-800
            rounded-xl shadow-2xl
            flex flex-col animate-modal">

      <div class="flex justify-between items-center
                  px-6 py-4 border-b border-gray-800
                  sticky top-0 bg-[#0f172a] z-10">
        <h2 class="text-lg font-semibold text-cyan-400">
          Packet Details
        </h2>

        <button
          onclick="closeDetailModal()"
          class="text-gray-400 hover:text-red-400 transition">
          ✕
        </button>
      </div>

      <div
        id="detailModalContent"
        class="px-6 py-5
              overflow-y-auto
              space-y-6
              text-sm">
      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="../assets/js/investigations.js"></script>
</body>

  <style>
    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .animate-modal {
      animation: modalIn 0.25s ease-out;
    }

    .glow-high {
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.6);
    }
    .glow-medium {
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.5);
    }
    .glow-low {
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.4);
    }

    .glow-purple {
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.4);
    }
    .glow-green {
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.4);
    }

    #detailModalContent::-webkit-scrollbar {
      width: 6px;
    }
    #detailModalContent::-webkit-scrollbar-thumb {
      background-color: rgba(148, 163, 184, 0.4);
      border-radius: 4px;
    }
    #detailModalContent::-webkit-scrollbar-track {
      background: transparent;
    }

    /* Active tab indicator */
    .tab-active {
      border-color: currentColor;
    }
  </style>

</html>
